<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CMDB - SGTI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary mb-4">
  <div class="container-fluid d-flex justify-content-between">

    <span class="navbar-brand mb-0 h1">
      SGTI - CMDB
    </span>

    <div class="d-flex gap-2">
      <input id="tokenInput" placeholder="Token" class="form-control form-control-sm">
      <button class="btn btn-light btn-sm" onclick="saveToken()">Login</button>
      <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>

  </div>
</nav>

<!-- CONTAINER -->
<div class="container-fluid">

  <!-- TABS -->
  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#assets">Ativos</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#relationships" onclick="loadRelationships()">Relacionamentos</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#services" onclick="loadServices()">Serviços</button>
    </li>
  </ul>

  <div class="tab-content">

    <!-- ATIVOS -->
    <div class="tab-pane fade show active" id="assets">

      <div class="d-flex justify-content-between mb-3">
        <h3>Ativos</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#assetModal">
          Novo Ativo
        </button>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <input id="searchInput" class="form-control" placeholder="Buscar por nome, tipo ou responsável">
        </div>
        <div class="col-md-2">
          <button class="btn btn-secondary w-100" onclick="loadAssets()">Buscar</button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-striped">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Tipo</th>
              <th>Descrição</th>
              <th>Responsável</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="assetsTableBody">
            <tr><td colspan="6">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- RELACIONAMENTOS -->
    <div class="tab-pane fade" id="relationships">
      <h3>Relacionamentos</h3>

      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>Origem</th>
            <th>Tipo</th>
            <th>Destino</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="relationshipsTableBody">
          <tr><td colspan="4">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- SERVIÇOS -->
    <div class="tab-pane fade" id="services">
      <h3>Serviços</h3>

      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Hosts</th>
          </tr>
        </thead>
        <tbody id="servicesTableBody">
          <tr><td colspan="4">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- MODAL ASSET -->
<div class="modal fade" id="assetModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Ativo</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="assetId">

        <div class="mb-3">
          <label>Nome</label>
          <input id="assetName" class="form-control">
        </div>

        <div class="mb-3">
          <label>Tipo</label>
          <input id="assetType" class="form-control">
        </div>

        <div class="mb-3">
          <label>Descrição</label>
          <textarea id="assetDescription" class="form-control"></textarea>
        </div>

        <div class="mb-3">
          <label>Responsável</label>
          <input id="assetOwner" class="form-control">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveAsset()">Salvar</button>
      </div>

    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function saveToken() {
  const t = document.getElementById('tokenInput').value
  localStorage.setItem('auth_token', t)
  alert("Token salvo")
}

function logout() {
  localStorage.removeItem('auth_token')
  location.reload()
}
</script>

<script type="module" src="/src/main.js"></script>

</body>
</html>
