<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
<div id="network" style="height:95vh"></div>

<script>
const API_URL = '/api'

function getToken() {
  return localStorage.getItem('auth_token') || 'dev-token'
}

async function apiFetch(url) {
  const resp = await fetch(url, {
    headers: { Authorization: `Bearer ${getToken()}` }
  })
  if (!resp.ok) throw new Error()
  return resp.json()
}

let network

async function loadGraph() {
  const data = await apiFetch(`${API_URL}/relacionamentos/`)

  const nodes = new vis.DataSet()
  const edges = new vis.DataSet()

  data.forEach(r => {
    nodes.add({ id: r.ativo_origem.id, label: r.ativo_origem.nome })
    nodes.add({ id: r.ativo_destino.id, label: r.ativo_destino.nome })

    edges.add({
      from: r.id_ativo_origem,
      to: r.id_ativo_destino,
      label: r.tipo_relacionamento
    })
  })

  if (network) {
    network.setData({ nodes, edges })
  } else {
    network = new vis.Network(
      document.getElementById("network"),
      { nodes, edges },
      {}
    )
  }
}

loadGraph()
</script>
</body>
</html>
